[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
norecursedirs = .git .gemini .system_generated data brain venv
addopts = --ignore=tests/test_gephi_bridge.py --ignore=tests/test_gephi_env.py --ignore=tests/test_activation_streamer.py --ignore=tests/verify_*.py --ignore=tests/test_advanced_nlp.py --verbose --strict-markers --tb=short --cov=src --cov=gateway --cov-report=term-missing:skip-covered --cov-report=html

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Markers
markers =
    asyncio: mark test as an async test (requires pytest-asyncio)
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    security: marks tests as security tests
    fast: marks tests as quick unit tests (run with '-m "fast"')
    phase1: core extension and plugin tests
    phase2: NLP, analysis, and processing tests
    phase3: full integration suite