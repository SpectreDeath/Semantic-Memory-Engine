[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
norecursedirs = .git .gemini .system_generated data brain venv
addopts = --ignore=tests/test_advanced_nlp.py --verbose --strict-markers --tb=short --cov=src --cov=gateway --cov-report=term-missing:skip-covered --cov-report=html --cov-fail-under=75
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Markers
markers =
    asyncio: mark test as an async test (requires pytest-asyncio)
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    security: marks tests as security tests
